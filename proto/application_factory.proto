syntax = "proto3";

package application_factory;

import "deploy_manager.proto";

// ApplicationFactory service orchestrates application lifecycle operations
// by composing lower-level services such as DeployManager.
service ApplicationFactory {
  // ActivateApplication deploys and activates a new application instance.
  // A typical implementation forwards deployment details to DeployManager.
  rpc ActivateApplication(ActivateApplicationRequest) returns (ActivateApplicationResponse);

  // ListActiveApplications returns all currently active application instances.
  rpc ListActiveApplications(ListActiveApplicationsRequest) returns (ListActiveApplicationsResponse);

  // TerminateApplication requests termination of a previously activated instance.
  rpc TerminateApplication(TerminateApplicationRequest) returns (TerminateApplicationResponse);
}

// Request message for ActivateApplication.
message ActivateApplicationRequest {
  // Content of the YAML configuration file used for activation/deployment.
  string yaml_content = 1;
  // Environment variables to apply during activation/deployment.
  repeated deploy_manager.EnvVar env_vars = 2;
}

// Response message for ActivateApplication.
message ActivateApplicationResponse {
  // Indicates whether activation was accepted.
  bool success = 1;
  // Identifier assigned to the activated application instance.
  string application_id = 2;
  // Human-readable report lines describing activation results.
  repeated string report = 3;
}

// Request message for ListActiveApplications.
message ListActiveApplicationsRequest {}

// Metadata for a single active application instance.
message ActiveApplication {
  // Identifier of the active application instance.
  string application_id = 1;
  // Human-readable application name.
  string app_name = 2;
}

// Response message for ListActiveApplications.
message ListActiveApplicationsResponse {
  // Collection of currently active application instances.
  repeated ActiveApplication applications = 1;
}

// Request message for TerminateApplication.
message TerminateApplicationRequest {
  // Identifier of the active application instance to terminate.
  string application_id = 1;
  // Optional human-readable reason for termination.
  string reason = 2;
}

// Response message for TerminateApplication.
message TerminateApplicationResponse {
  // Indicates whether termination was accepted.
  bool success = 1;
  // Human-readable message describing the result.
  string message = 2;
}
