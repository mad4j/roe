syntax = "proto3";

package deploy_manager;

// DeployManager service for managing deployments
service DeployManager {
  // Deploy accepts a YAML file content and a list of environment variables
  rpc Deploy(DeployRequest) returns (DeployResponse);
}

// A single environment variable represented as a key-value pair
message EnvVar {
  string key = 1;
  string value = 2;
}

// Request message for the Deploy RPC
message DeployRequest {
  // Content of the YAML configuration file
  string yaml_content = 1;
  // List of environment variables to apply during deployment
  repeated EnvVar env_vars = 2;
}

// Response message for the Deploy RPC
message DeployResponse {
  // Indicates whether the deployment succeeded
  bool success = 1;
  // Human-readable message describing the result
  string message = 2;
}
