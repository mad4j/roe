syntax = "proto3";

package managed_application;

// ManagedApplication service exposes metadata about the running application
service ManagedApplication {
  // Info returns the application name and the table of listening addresses
  // together with the services accessible from each address
  rpc Info(InfoRequest) returns (InfoResponse);
}

// Request message for the Info RPC (no parameters required)
message InfoRequest {}

// A listening address paired with the services reachable at that address
message ListeningAddress {
  // Network address the server is bound to (e.g. "[::1]:50051")
  string address = 1;
  // Names of gRPC services accessible at this address
  repeated string services = 2;
}

// Response message for the Info RPC
message InfoResponse {
  // Human-readable name of the application
  string app_name = 1;
  // Table of listening addresses and their associated services
  repeated ListeningAddress listening_addresses = 2;
}
