syntax = "proto3";

package configurable_application;

// ConfigurableApplication service exposes methods to inspect and modify
// the runtime configuration of an application through a list of DataItems.
service ConfigurableApplication {
  // Query returns configuration DataItems.
  // If the request contains one or more items (identified by name), only those
  // items are returned. If the request items list is empty, all configuration
  // items are returned.
  rpc Query(QueryRequest) returns (QueryResponse);

  // Configure applies a sequence of DataItems to the application configuration.
  // Only items with value_set = true will be written; others are ignored.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
}

// Enumeration of the supported data types for a configuration item.
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_BOOL        = 1;
  DATA_TYPE_INT64       = 2;
  DATA_TYPE_DOUBLE      = 3;
  DATA_TYPE_STRING      = 4;
  DATA_TYPE_BYTES       = 5;
  // NULL indicates that no value has been assigned to this item.
  DATA_TYPE_NULL        = 6;
}

// A single named configuration item with an optional typed value.
message DataItem {
  // Unique name identifying the configuration parameter.
  string name = 1;

  // Declared type of this configuration parameter.
  DataType type = 2;

  // Exactly one of the following value fields should be populated
  // when value_set is true, consistent with the declared type.
  oneof value {
    bool   bool_value   = 3;
    int64  int64_value  = 4;
    double double_value = 5;
    string string_value = 6;
    bytes  bytes_value  = 7;
  }
}

// Request message for the Query RPC.
message QueryRequest {
  // Optional filter: DataItems whose names identify the parameters to retrieve.
  // Only the name field of each item is significant in this context.
  // When this list is non-empty only the matching items are returned.
  // When this list is empty all configuration items are returned.
  repeated DataItem items = 1;
}

// Response message for the Query RPC.
message QueryResponse {
  // Requested configuration items.
  // Items that have no current value will have type = DATA_TYPE_NULL.
  repeated DataItem items = 1;
}

// Request message for the Configure RPC.
message ConfigureRequest {
  // Sequence of DataItems to apply.
  // Items with value_set = false are silently skipped.
  repeated DataItem items = 1;
}

// Response message for the Configure RPC.
message ConfigureResponse {
  // Indicates whether the configuration was applied successfully.
  bool success = 1;
  // Human-readable message describing the result or any validation errors.
  string message = 2;
  // Items that were rejected or only partially applied, if any.
  repeated DataItem rejected_items = 3;
}
